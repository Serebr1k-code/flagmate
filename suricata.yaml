%YAML 1.1
---
app-layer:
    protocols:
        http:
            detection-ports:
                dp: 80, 443, 8080, 18080, 18081, 18082, 18083, 3000
            enabled: "yes"
default-log-dir: /var/log/suricata
default-rule-path: /etc/suricata/rules
logging:
    outputs:
        - console:
            enabled: "yes"
            level: Info
outputs:
    - eve-log:
        enabled: "yes"
        filename: eve.json
        filetype: regular
        types:
            - flow
            - http:
                custom:
                    - hostname
                    - url
                    - http_user_agent
                    - http_content_type
                    - http_method
                    - http_content_length
                    - status
                    - http_referer
                    - protocol
                    - length
                extended: "yes"
            - alert
            - dns
            - tls
            - stats
    - eve-log:
        enabled: "yes"
        filename: /var/run/suricata/eve.sock
        filetype: unix_stream
        types:
            - http
rule-files:
    - ctf.rules
runmode: workers
stream:
    checksum-validation: false
    inline: "no"
    midstream: true
    reassembly:
        depth: 1mb

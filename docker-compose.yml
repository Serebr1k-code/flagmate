services:
  backend:
    image: alpine:3.20
    command: /app/server/server
    environment:
      UI_PASSWORD: admin
      JWT_SECRET: supersecretjwtkey
      DB_PATH: /data/flagmate.db
      GATE_ENABLED: "true"
      GATE_LISTEN: :18080
      STABLE_THRESHOLD: "5"
    volumes:
      - ./backend/server:/app/server
      - ./backend-data:/data
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      flagmate:

  frontend:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      flagmate:

networks:
  flagmate:

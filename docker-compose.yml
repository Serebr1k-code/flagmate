services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      UI_PASSWORD: ${UI_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      STABLE_THRESHOLD: ${STABLE_THRESHOLD:-5}
      EVE_SOCKET: ${EVE_SOCKET:-/var/run/suricata/eve.sock}
      DB_PATH: ${DB_PATH:-/data/flagmate.db}
      AUTO_HOOK_SURICATA: ${AUTO_HOOK_SURICATA:-true}
      SURICATA_YAML_PATH: ${SURICATA_YAML_PATH:-/etc/suricata/suricata.yaml}
      SURICATA_PID: ${SURICATA_PID:-0}
      GATE_ENABLED: ${GATE_ENABLED:-true}
      GATE_LISTEN: ${GATE_LISTEN:-:18080}
      GATE_UPSTREAM: ${GATE_UPSTREAM:-http://testservice:18080}
      POISON_IMAGE_DIR: ${POISON_IMAGE_DIR:-/app/poison-images}
    volumes:
      - ./backend-data:/data
      - ./sockets:/var/run/suricata
      - ./suricata.yaml:/etc/suricata/suricata.yaml
      - ./assets/femboy:/app/poison-images:ro
    ports:
      - "8080:8080"
      - "18080:18080"
    restart: unless-stopped
    networks:
      flagmate:
        ipv4_address: 172.28.0.2

  testservice:
    image: python:3.11-alpine
    command: ["python", "/app/test_service.py"]
    volumes:
      - ./test_service.py:/app/test_service.py:ro
    restart: unless-stopped
    networks:
      flagmate:
        ipv4_address: 172.28.0.4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      flagmate:
        ipv4_address: 172.28.0.3

networks:
  flagmate:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # ═══════════════════════════════════════
  # Flagmate core
  # ═══════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      UI_PASSWORD: ${UI_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      STABLE_THRESHOLD: ${STABLE_THRESHOLD:-5}
      EVE_SOCKET: ${EVE_SOCKET:-/var/run/suricata/eve.sock}
      DB_PATH: ${DB_PATH:-/data/flagmate.db}
      AUTO_HOOK_SURICATA: ${AUTO_HOOK_SURICATA:-true}
      SURICATA_YAML_PATH: ${SURICATA_YAML_PATH:-/etc/suricata/suricata.yaml}
      SURICATA_PID: ${SURICATA_PID:-0}
      GATE_ENABLED: ${GATE_ENABLED:-true}
      GATE_LISTEN: ${GATE_LISTEN:-:18080}
    volumes:
      - ./backend-data:/data
      - ./sockets:/var/run/suricata
      - ./suricata.yaml:/etc/suricata/suricata.yaml
      - ./assets/femboy:/app/poison-images:ro
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      flagmate:
        ipv4_address: 172.28.0.2

  suricata:
    image: jasonish/suricata:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        IFACE=$$(ip -o -4 route show to default | awk '{print $$5}' | head -1);
        echo "Detected interface: $$IFACE";
        exec suricata -c /etc/suricata/suricata.yaml -i "lo" -l /var/log/suricata -S /etc/suricata/rules/ctf.rules
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./rules:/etc/suricata/rules:ro
      - ./sockets:/var/run/suricata
      - ./suricata-logs:/var/log/suricata
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      flagmate:
        ipv4_address: 172.28.0.3

  # ═══════════════════════════════════════
  # S4DFarm (flag collection farm)
  # ═══════════════════════════════════════
  farm-postgres:
    image: postgres:14.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: farm
      POSTGRES_PASSWORD: farm
      POSTGRES_DB: farm
    volumes:
      - ./farm-data/db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U farm -d farm
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      flagmate:
        ipv4_address: 172.28.0.10

  farm-redis:
    image: redis:7.2.0-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./farm-data/redis:/data
    networks:
      flagmate:
        ipv4_address: 172.28.0.11

  farm:
    build:
      context: ./s4dfarm/server
      dockerfile: ./docker/server/Dockerfile
    volumes:
      - ./s4dfarm/server/app:/app
    environment:
      REDIS_URL: 'redis://farm-redis:6379/0'
      POSTGRES_DSN: 'host=farm-postgres port=5432 user=farm password=farm dbname=farm'
      SERVER_PASSWORD: ${FARM_PASSWORD:-flagmate}
    restart: unless-stopped
    depends_on:
      farm-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5137:5000"
    networks:
      flagmate:
        ipv4_address: 172.28.0.12

  farm-celery:
    build:
      context: ./s4dfarm/server
      dockerfile: ./docker/celery/Dockerfile
    volumes:
      - ./s4dfarm/server/app:/app
    environment:
      CELERY_BROKER_URL: 'redis://farm-redis:6379/1'
      POSTGRES_DSN: 'host=farm-postgres port=5432 user=farm password=farm dbname=farm'
    restart: unless-stopped
    depends_on:
      farm-postgres:
        condition: service_healthy
    networks:
      flagmate:
        ipv4_address: 172.28.0.13

networks:
  flagmate:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      UI_PASSWORD: ${UI_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      DB_PATH: /data/flagmate.db
      GATE_ENABLED: "true"
      GATE_LISTEN: :18080
    volumes:
      - ./backend-data:/data
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      flagmate:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      flagmate:

networks:
  flagmate:
    driver: bridge
